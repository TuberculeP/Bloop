services:
  vst-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DISPLAY=:99
    cap_add:
      - SYS_NICE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
